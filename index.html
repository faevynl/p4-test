<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMP Phase 4 Examination</title>
<style>
  body {
    font-family: "Segoe UI", sans-serif;
    background-color: #1e1e1e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  #app {
    width: 100%;
    max-width: 500px;
  }

  .question-card {
    background-color: #000;
    border: 2px solid #ff69b4; /* pink border */
    border-radius: 16px;
    padding: 20px;
    color: #fff;
    margin-bottom: 20px;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    text-align: center;
  }

  #input-area {
    display: flex;
    gap: 10px;
  }

  #answer {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 2px solid #ff69b4;
    background-color: #000;
    color: #fff;
    font-size: 16px;
  }

  #sendBtn {
    padding: 12px 20px;
    border-radius: 12px;
    border: 2px solid #ff69b4;
    background-color: #000;
    color: #fff;
    cursor: pointer;
    font-size: 16px;
  }

  #sendBtn:hover {
    background-color: #ff69b4;
    color: #000;
  }
</style>
</head>
<body>

<div id="app">
  <div id="question" class="question-card">Loading...</div>
  <div id="input-area">
    <input type="text" id="answer" placeholder="Type your answer here">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const questions = [
  "Enter your Roblox username:",
  "Enter your Discord username:",
  "Enter your Discord ID:",
  "Why do you want to join?"
];

let current = 0;

const questionEl = document.getElementById('question');
const answerEl = document.getElementById('answer');
const sendBtn = document.getElementById('sendBtn');

function loadQuestion() {
  if(current >= questions.length) {
    questionEl.textContent = "Application Submitted! Thank you.";
    document.getElementById('input-area').style.display = 'none';
    return;
  }
  questionEl.textContent = questions[current];
  answerEl.value = '';
}

function nextQuestion() {
  const ans = answerEl.value.trim() || "No answer provided";
  console.log(`Q${current+1}: ${ans}`); // Here you would send to Discord
  current++;
  loadQuestion();
}

sendBtn.addEventListener('click', nextQuestion);
answerEl.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') {
    e.preventDefault();
    nextQuestion();
  }
});

// Start
loadQuestion();
</script>

</body>
</html>
