<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMP Phase 4 Examination</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background-color: #0a0a0a;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(255, 105, 180, 0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0, 220, 255, 0.07) 0%, transparent 60%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
  }

  #app {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    background: linear-gradient(135deg, #0d0d0d, #111);
    border: 1px solid rgba(255, 105, 180, 0.3);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #ff69b4, #00dcff, #ff69b4);
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .header-logo {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    object-fit: cover;
    border: 1px solid rgba(255,105,180,0.4);
    flex-shrink: 0;
  }
  .header-text { flex: 1; }
  .header-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: #fff;
    letter-spacing: 1px;
  }
  .header-subtitle {
    font-size: 12px;
    color: #00dcff;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .notice-card {
    background: linear-gradient(135deg, rgba(0,220,255,0.05), rgba(255,105,180,0.05));
    border: 1px solid rgba(0, 220, 255, 0.25);
    border-radius: 12px;
    padding: 12px 16px;
    color: #99b4c0;
    font-size: 12px;
    text-align: center;
    line-height: 1.6;
    transition: all 0.5s;
  }
  .notice-card.hidden { opacity: 0; max-height: 0; padding: 0; margin: 0; border: none; overflow: hidden; }

  .meta-row { display: flex; justify-content: space-between; align-items: center; }
  .progress {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: #ff69b4;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .timer {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #00dcff;
    display: none;
  }
  .timer.warning { color: #ff4444; animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

  .progress-bar-track {
    width: 100%; height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #ff69b4, #00dcff);
    transition: width 0.4s ease;
  }

  .question-card {
    background: #0d0d0d;
    border: 1px solid rgba(255, 105, 180, 0.3);
    border-radius: 16px;
    padding: 40px 24px;
    color: #f0f0f0;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    box-shadow: 0 0 30px rgba(255, 105, 180, 0.05);
  }

  #input-area { display: none; gap: 10px; margin-top: 10px; }
  #answer {
    flex: 1; padding: 13px 16px; border-radius: 12px;
    border: 1px solid rgba(255, 105, 180, 0.35);
    background: #0d0d0d; color: #fff; outline: none;
  }

  .action-btn {
    padding: 14px 28px;
    border-radius: 12px;
    border: 1px solid rgba(0, 220, 255, 0.5);
    background: rgba(0, 220, 255, 0.1);
    color: #00dcff;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  .action-btn:hover {
    background: #00dcff; color: #000;
    box-shadow: 0 0 20px rgba(0, 220, 255, 0.4);
  }
  .start-btn {
    border-color: rgba(255, 105, 180, 0.5);
    background: rgba(255, 105, 180, 0.1);
    color: #ff69b4;
  }
  .start-btn:hover {
    background: #ff69b4; color: #000;
    box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
  }

  #sendBtn {
    padding: 13px 22px; border-radius: 12px; border: 1px solid #ff69b4;
    background: transparent; color: #fff; cursor: pointer;
  }
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <img src="https://i.imgur.com/mWDOZI5.png" class="header-logo" alt="Logo">
    <div class="header-text">
      <div class="header-title">TMP EXAMINATION</div>
      <div class="header-subtitle">Phase 4 · Written Assessment</div>
    </div>
  </div>

  <div class="notice-card" id="notice">
    <strong>Verification Required</strong><br>
    Click below to link your Discord account. This is required to start.
  </div>

  <div class="meta-row">
    <div class="progress" id="progress">Awaiting Link...</div>
    <div class="timer" id="timer">⏱ 2:00</div>
  </div>

  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progressBar"></div>
  </div>

  <div id="question" class="question-card">
    <button id="discordBtn" class="action-btn" onclick="loginWithDiscord()">Link Discord Account</button>
    <button id="startBtn" class="action-btn start-btn" onclick="startExam()" style="display:none;">Start Examination</button>
  </div>

  <div id="input-area">
    <input type="text" id="answer" placeholder="Type your answer here...">
    <button id="sendBtn">Submit</button>
  </div>
</div>

<script>
const WORKER_URL = "https://server.yyourmom96.workers.dev";
const CLIENT_ID = '1487244125488152589';
const REDIRECT_URI = window.location.href.split('#')[0];
const TIME_LIMIT = 120;

let current = 0;
let answers = [];
let timerInterval = null;
let secondsLeft = TIME_LIMIT;
window.linkedUser = null;

const infoQuestions = ["Enter your Roblox username:"];
const mainQuestions = [
  "You observe a Soldier wearing an Advisor mask and armband, randomly killing a player in a restricted area they were not assigned to guard, while a Manager watches and fails to intervene. What do you do?",
  "A VIP is using the :char command to appear as a Manager and is attempting to give orders to Workers during a tryout. What do you do?",
  "A staff member submits a report clip of a player no-clipping, but the username is not visible in the footage. What do you do?",
  "Describe the 'Authority Inheritance' protocol for a Sentry guarding a Supreme Rank. If a Sentry is guarding the Frontman, what specific authority do they possess over other staff members, and when is this authority valid?",
  "In Round 2 of a Soldier Evaluation (Outscore 9), an attendee finishes with 1250 Damage, a 1:1 KDR, and 450 heals. Do they pass? What do you do?",
  "Write the exact sequence of commands to protect your tryoutees, identify flying exploiters, and the specific ban format for a user named 'RaidLeader123'.",
  "Identify the rank requirements for a Section Leader, a Platoon CO, and Company Leadership.",
  "During a Merit Department promotion wave, what are the specific restrictions regarding the discussion of Managers on Trial? Additionally, what is the mandatory evidence requirement for any individual being considered for a promotion to Supervisor or higher?",
  "Type a batch command string that gives you a sword, waits 5 seconds, announces 'Event Starting' to the server, and teleports all players on the 'Tryoutee' team to you.",
  "Contrast the primary roles of The Management Program and the Justice Department.",
  "Does High Command have authority over Sentry or Rangers? How do you report an infraction by a member of these divisions, and how do you identify 'stolen valor' using their mask ranks?",
  "Explain the specific regulations regarding VIP Vitality commands (e.g., :god) when a VIP intends to enter combat. What are the two conditions they must satisfy before engaging an armed opponent, and can they leave the VIP room while godded?",
  "Contrast the first-offense punishment for Corruption versus Insubordination for a Soldier. Who has the final authority on permanent blacklists?",
  "Explain the first three steps of the I STAFF method. What is the impact of being placed on Zero Tolerance?"
];
const allQuestions = [...infoQuestions, ...mainQuestions];

// 1. Redirect to Discord
function loginWithDiscord() {
    const url = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
    window.location.href = url;
}

// 2. Check for Token on Page Load
window.onload = () => {
    const hash = window.location.hash.slice(1);
    const params = new URLSearchParams(hash);
    const token = params.get('access_token');

    if (token) {
        fetch('https://discord.com/api/users/@me', {
            headers: { Authorization: `Bearer ${token}` }
        })
        .then(res => res.json())
        .then(user => {
            window.linkedUser = user;
            document.getElementById('notice').innerHTML = `✅ Linked: ${user.username} (${user.id})`;
            document.getElementById('discordBtn').style.display = 'none';
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('progress').innerText = "Account Verified";
            window.history.replaceState({}, document.title, REDIRECT_URI);
        })
        .catch(() => {
            alert("Discord session expired. Please link again.");
        });
    }
};

// 3. Exam Logic
function startExam() {
    if (!window.linkedUser) return alert("Please link your Discord first!");
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('notice').classList.add('hidden');
    document.getElementById('input-area').style.display = 'flex';
    loadQuestion();
}

function loadQuestion() {
    if (current >= allQuestions.length) {
        finishExam();
        return;
    }
    const pct = (current / allQuestions.length) * 100;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progress').innerText = `Question ${current + 1} / ${allQuestions.length}`;
    document.getElementById('question').innerText = allQuestions[current];
    document.getElementById('answer').value = '';
    document.getElementById('answer').focus();

    if (current >= infoQuestions.length) {
        document.getElementById('timer').style.display = 'block';
        startTimer();
    }
}

function startTimer() {
    clearInterval(timerInterval);
    secondsLeft = TIME_LIMIT;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
        secondsLeft--;
        updateTimerDisplay();
        if (secondsLeft <= 0) {
            clearInterval(timerInterval);
            nextQuestion(true);
        }
    }, 1000);
}

function updateTimerDisplay() {
    const mins = Math.floor(secondsLeft / 60);
    const secs = secondsLeft % 60;
    const el = document.getElementById('timer');
    el.innerText = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
    el.className = 'timer' + (secondsLeft <= 30 ? ' warning' : '');
}

function nextQuestion(timedOut = false) {
    const val = document.getElementById('answer').value.trim();
    answers.push(timedOut ? "Timed Out" : (val || "N/A"));
    current++;
    loadQuestion();
}

document.getElementById('sendBtn').onclick = () => nextQuestion(false);
document.getElementById('answer').onkeydown = (e) => { if(e.key === 'Enter') nextQuestion(false); };

function finishExam() {
    clearInterval(timerInterval);
    document.getElementById('timer').style.display = 'none';
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('progressBar').style.width = '100%';
    document.getElementById('question').innerHTML = `<div style="font-size:20px; font-weight:700;">SUBMITTING...</div>`;
    sendToDiscord();
}

function sendToDiscord() {
  const user = window.linkedUser;
  const robloxName = answers[0] || "Unknown";
  let content = `👤 **Examinee Info**\n**Roblox:** ${robloxName}\n**Discord:** ${user.username}\n**ID:** ${user.id}\n\n➡️ **Responses**\n\n`;

  mainQuestions.forEach((q, i) => {
    content += `**Q${i+1}:** ${q}\n────────────\n${answers[i+1]}\n\n`;
  });

  fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username: robloxName,
      content: content,
      avatar: `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`,
      tag: user.username
    })
  }).then(() => {
    document.getElementById('question').innerHTML = `
      <span style="font-size:40px;">✅</span><br>
      <div style="font-family:Rajdhani; font-weight:700; font-size:24px;">SUCCESS</div>
      <div style="color:#555; font-size:13px;">Your exam has been logged.</div>
    `;
  });
}
</script>
</body>
</html>
