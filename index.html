<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMP Phase 4 Examination</title>
<style>
  body { font-family: "Segoe UI", sans-serif; background-color: #1e1e1e; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
  #app { width: 100%; max-width: 500px; }
  .notice-card { background-color: #1a1a2e; border: 2px solid #ff69b4; border-radius: 16px; padding: 16px 20px; color: #ccc; font-size: 13px; text-align: center; margin-bottom: 14px; line-height: 1.5; }
  .notice-card strong { color: #ff69b4; }
  .progress { color: #aaa; font-size: 13px; text-align: right; margin-bottom: 8px; }
  .question-card { background-color: #000; border: 2px solid #ff69b4; border-radius: 16px; padding: 20px; color: #fff; margin-bottom: 16px; min-height: 80px; display: flex; align-items: center; justify-content: center; font-size: 16px; text-align: center; line-height: 1.5; }
  #input-area { display: flex; gap: 10px; }
  #answer { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #ff69b4; background-color: #000; color: #fff; font-size: 16px; }
  #sendBtn { padding: 12px 20px; border-radius: 12px; border: 2px solid #ff69b4; background-color: #000; color: #fff; cursor: pointer; font-size: 16px; }
  #sendBtn:hover { background-color: #ff69b4; color: #000; }
</style>
</head>
<body>
<div id="app">
  <div class="notice-card">
    <strong> Notice</strong><br>
    Your answers will be submitted to TMP staff via Discord for review. By completing this form, you consent to your responses being stored and reviewed by TMP staff.
  </div>
  <div class="progress" id="progress"></div>
  <div id="question" class="question-card">Loading...</div>
  <div id="input-area">
    <input type="text" id="answer" placeholder="Type your answer here">
    <button id="sendBtn">Send</button>
  </div>
</div>
<script>
const WORKER_URL = "https://server.yyourmom96.workers.dev";

const infoQuestions = [
  "Enter your Roblox username:",
  "Enter your Discord username:",
  "Enter your Discord ID:"
];

const mainQuestions = [
  "You observe a Soldier wearing an Advisor mask and armband, randomly killing a player in a restricted area they were not assigned to guard, while a Manager watches and fails to intervene. What do you do?",
  "A VIP is using the :char command to appear as a Manager and is attempting to give orders to Workers during a tryout. What do you do?",
  "A staff member submits a report clip of a player no-clipping, but the username is not visible in the footage. What do you do?",
  "Describe the 'Authority Inheritance' protocol for a Sentry guarding a Supreme Rank. If a Sentry is guarding the Frontman, what specific authority do they possess over other staff members, and when is this authority valid?",
  "In Round 2 of a Soldier Evaluation (Outscore 9), an attendee finishes with 1250 Damage, a 1:1 KDR, and 450 heals. Do they pass? What do you do?",
  "Write the exact sequence of commands to protect your tryoutees, identify flying exploiters, and the specific ban format for a user named 'RaidLeader123'.",
  "Identify the rank requirements for a Section Leader, a Platoon CO, and Company Leadership.",
  "During a Merit Department promotion wave, what are the specific restrictions regarding the discussion of Managers on Trial? Additionally, what is the mandatory evidence requirement for any individual being considered for a promotion to Supervisor or higher?",
  "Type a batch command string that gives you a sword, waits 5 seconds, announces 'Event Starting' to the server, and teleports all players on the 'Tryoutee' team to you.",
  "Contrast the primary roles of the Community Department and the Justice Department.",
  "Does High Command have authority over Sentry or Rangers? How do you report an infraction by a member of these divisions, and how do you identify 'stolen valor' using their mask ranks?",
  "Explain the specific regulations regarding VIP Vitality commands (e.g., :god) when a VIP intends to enter combat. What are the two conditions they must satisfy before engaging an armed opponent, and can they leave the VIP room while godded?",
  "Contrast the first-offense punishment for Corruption versus Insubordination for a Soldier. Who has the final authority on permanent blacklists?",
  "Explain the first three steps of the I STAFF method. What is the impact of being placed on Zero Tolerance?"
];

const allQuestions = [...infoQuestions, ...mainQuestions];
let current = 0;
const answers = [];

const questionEl = document.getElementById('question');
const answerEl = document.getElementById('answer');
const sendBtn = document.getElementById('sendBtn');
const progressEl = document.getElementById('progress');

function loadQuestion() {
  if (current >= allQuestions.length) {
    questionEl.textContent = "✅ Application Submitted! Thank you. Your answers have been sent to the TMP moderation team.";
    document.getElementById('input-area').style.display = 'none';
    progressEl.style.display = 'none';
    sendToDiscord();
    return;
  }
  progressEl.textContent = `Question ${current + 1} of ${allQuestions.length}`;
  questionEl.textContent = allQuestions[current];
  answerEl.value = '';
  answerEl.focus();
}

function nextQuestion() {
  const ans = answerEl.value.trim() || "No answer";
  answers.push(ans);
  current++;
  loadQuestion();
}

function sendToDiscord() {
  const infoFields = infoQuestions.map((q, i) => ({
    name: q,
    value: answers[i] || "No answer",
    inline: false
  }));

  const mainFields = mainQuestions.map((q, i) => ({
    name: `Q${i + 1}: ${q.substring(0, 100)}${q.length > 500 ? '...' : ''}`,
    value: answers[infoQuestions.length + i] || "No answer",
    inline: false
  }));

  const embed = {
    title: "TMP Phase 4 Examination Submission",
    color: 0xff69b4,
    fields: [...infoFields, ...mainFields],
    timestamp: new Date().toISOString()
  };

  fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ embeds: [embed] })
  })
  .then(() => console.log("Sent!"))
  .catch(e => console.error("Error:", e));
}

sendBtn.addEventListener('click', nextQuestion);
answerEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); nextQuestion(); }
});

loadQuestion();
</script>
</body>
</html>
