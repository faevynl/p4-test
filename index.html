<script>
const questions = [
  "Enter your Roblox username:",
  "Enter your Discord username:",
  "Enter your Discord ID:",
  "Why do you want to join?"
];

let current = 0;
const answers = [];

const questionEl = document.getElementById('question');
const answerEl = document.getElementById('answer');
const sendBtn = document.getElementById('sendBtn');

const webhookURL = "https://discord.com/api/webhooks/1487192982082949120/sVQ2wN2UB1oHlbqRtpjaOYUd6itFrHZe6dIbp1ireheQQYCnb4wQEPtHdmAf35UXKUPb";

function loadQuestion() {
  if(current >= questions.length) {
    questionEl.textContent = "Application Submitted! Thank you.";
    document.getElementById('input-area').style.display = 'none';
    sendToDiscord();
    return;
  }
  questionEl.textContent = questions[current];
  answerEl.value = '';
}

function nextQuestion() {
  const ans = answerEl.value.trim() || "No answer provided";
  answers.push({ question: questions[current], answer: ans });
  current++;
  loadQuestion();
}

function sendToDiscord() {
  const embed = {
    title: "New Application Submission",
    color: 0xff69b4, // pink
    fields: answers.map(a => ({ name: a.question, value: a.answer }))
  };

  fetch(webhookURL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ embeds: [embed] })
  })
  .then(res => {
    if(res.ok) {
      console.log("Sent to Discord successfully!");
    } else {
      console.error("Failed to send:", res.statusText);
    }
  })
  .catch(err => console.error("Error sending webhook:", err));
}

sendBtn.addEventListener('click', nextQuestion);
answerEl.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') {
    e.preventDefault();
    nextQuestion();
  }
});

// Start
loadQuestion();
</script>
