<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMP Phase 4 Examination</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", sans-serif;
    background-color: #1e1e1e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  #app { width: 100%; max-width: 540px; }

  .notice-card {
    background-color: #1a1a2e;
    border: 2px solid #ff69b4;
    border-radius: 16px;
    padding: 14px 18px;
    color: #ccc;
    font-size: 13px;
    text-align: center;
    margin-bottom: 12px;
    line-height: 1.6;
  }
  .notice-card strong { color: #ff69b4; }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .progress { color: #aaa; font-size: 13px; }
  .timer { font-size: 13px; color: #aaa; }
  .timer.warning { color: #ff4444; font-weight: bold; }

  .question-card {
    background-color: #000;
    border: 2px solid #ff69b4;
    border-radius: 16px;
    padding: 24px 20px;
    color: #fff;
    margin-bottom: 14px;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    text-align: center;
    line-height: 1.6;
  }

  #input-area { display: flex; gap: 10px; }
  #answer {
    flex: 1;
    padding: 12px 14px;
    border-radius: 12px;
    border: 2px solid #ff69b4;
    background-color: #000;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  #answer:focus { border-color: #ff9fd4; }
  #sendBtn {
    padding: 12px 20px;
    border-radius: 12px;
    border: 2px solid #ff69b4;
    background-color: #000;
    color: #fff;
    cursor: pointer;
    font-size: 15px;
    transition: background-color 0.2s, color 0.2s;
    white-space: nowrap;
  }
  #sendBtn:hover { background-color: #ff69b4; color: #000; }

  .done-card {
    background-color: #000;
    border: 2px solid #ff69b4;
    border-radius: 16px;
    padding: 32px 24px;
    color: #fff;
    text-align: center;
    font-size: 16px;
    line-height: 1.9;
  }
  .done-card span { color: #ff69b4; font-weight: bold; }
</style>
</head>
<body>
<div id="app">
  <div class="notice-card">
    <strong>📋 Data Notice</strong><br>
    Your answers will be submitted to TMP staff via Discord for review. By completing this examination, you consent to your responses being stored and reviewed by TMP staff.
  </div>
  <div class="meta-row">
    <div class="progress" id="progress"></div>
    <div class="timer" id="timer"></div>
  </div>
  <div id="question" class="question-card">Loading...</div>
  <div id="input-area">
    <input type="text" id="answer" placeholder="Type your answer here">
    <button id="sendBtn">Submit</button>
  </div>
</div>

<script>
const WORKER_URL = "https://server.yyourmom96.workers.dev";
const TIME_LIMIT = 120;

const infoQuestions = [
  "Enter your Roblox username:",
  "Enter your Discord username:",
  "Enter your Discord ID:"
];

const mainQuestions = [
  "You observe a Soldier wearing an Advisor mask and armband, randomly killing a player in a restricted area they were not assigned to guard, while a Manager watches and fails to intervene. What do you do?",
  "A VIP is using the :char command to appear as a Manager and is attempting to give orders to Workers during a tryout. What do you do?",
  "A staff member submits a report clip of a player no-clipping, but the username is not visible in the footage. What do you do?",
  "Describe the 'Authority Inheritance' protocol for a Sentry guarding a Supreme Rank. If a Sentry is guarding the Frontman, what specific authority do they possess over other staff members, and when is this authority valid?",
  "In Round 2 of a Soldier Evaluation (Outscore 9), an attendee finishes with 1250 Damage, a 1:1 KDR, and 450 heals. Do they pass? What do you do?",
  "Write the exact sequence of commands to protect your tryoutees, identify flying exploiters, and the specific ban format for a user named 'RaidLeader123'.",
  "Identify the rank requirements for a Section Leader, a Platoon CO, and Company Leadership.",
  "During a Merit Department promotion wave, what are the specific restrictions regarding the discussion of Managers on Trial? Additionally, what is the mandatory evidence requirement for any individual being considered for a promotion to Supervisor or higher?",
  "Type a batch command string that gives you a sword, waits 5 seconds, announces 'Event Starting' to the server, and teleports all players on the 'Tryoutee' team to you.",
  "Contrast the primary roles of the Community Department and the Justice Department.",
  "Does High Command have authority over Sentry or Rangers? How do you report an infraction by a member of these divisions, and how do you identify 'stolen valor' using their mask ranks?",
  "Explain the specific regulations regarding VIP Vitality commands (e.g., :god) when a VIP intends to enter combat. What are the two conditions they must satisfy before engaging an armed opponent, and can they leave the VIP room while godded?",
  "Contrast the first-offense punishment for Corruption versus Insubordination for a Soldier. Who has the final authority on permanent blacklists?",
  "Explain the first three steps of the I STAFF method. What is the impact of being placed on Zero Tolerance?"
];

const allQuestions = [...infoQuestions, ...mainQuestions];
let current = 0;
const answers = [];
let timerInterval = null;
let secondsLeft = TIME_LIMIT;
let appStartTime = Date.now();
let questionStartTime = Date.now();
let questionTimes = [];

const questionEl = document.getElementById('question');
const answerEl = document.getElementById('answer');
const sendBtn = document.getElementById('sendBtn');
const progressEl = document.getElementById('progress');
const timerEl = document.getElementById('timer');

sendBtn.addEventListener('click', () => nextQuestion(false));
answerEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); nextQuestion(false); }
});

function startTimer() {
  clearInterval(timerInterval);
  secondsLeft = TIME_LIMIT;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      nextQuestion(true);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const mins = Math.floor(secondsLeft / 60);
  const secs = secondsLeft % 60;
  timerEl.textContent = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
  timerEl.className = 'timer' + (secondsLeft <= 30 ? ' warning' : '');
}

function loadQuestion() {
  if (current >= allQuestions.length) {
    clearInterval(timerInterval);
    timerEl.style.display = 'none';
    progressEl.style.display = 'none';
    document.getElementById('input-area').style.display = 'none';
    questionEl.className = 'done-card';
    questionEl.innerHTML = `✅ Examination Submitted!<br><br><span>Thank you.</span><br>Your answers have been sent to TMP staff for review.`;
    sendToDiscord();
    return;
  }

  timerEl.style.display = current >= infoQuestions.length ? 'block' : 'none';
  progressEl.textContent = `Question ${current + 1} of ${allQuestions.length}`;
  questionEl.textContent = allQuestions[current];
  answerEl.value = '';
  answerEl.focus();
  questionStartTime = Date.now();

  if (current >= infoQuestions.length) {
    startTimer();
  } else {
    clearInterval(timerInterval);
  }
}

function nextQuestion(timedOut) {
  const timeSpent = Math.round((Date.now() - questionStartTime) / 1000);
  if (current >= infoQuestions.length) {
    questionTimes.push(timedOut ? TIME_LIMIT : Math.min(timeSpent, TIME_LIMIT));
  }
  const ans = timedOut || answerEl.value.trim() === ''
    ? "Failure to provide an answer within the time limit."
    : answerEl.value.trim();
  answers.push(ans);
  current++;
  loadQuestion();
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function sendToDiscord() {
  const totalSeconds = Math.round((Date.now() - appStartTime) / 1000);
  const avgSeconds = Math.round(questionTimes.reduce((a, b) => a + b, 0) / questionTimes.length);

  const infoValue = infoQuestions.map((q, i) => `**${q}** ${answers[i] || "No answer"}`).join("\n");

  const mainFields = mainQuestions.map((q, i) => {
    const answer = answers[infoQuestions.length + i] || "No answer";
    const value = `**Q:** ${q}\n**A:** ${answer}`;
    return {
      name: `Question ${i + 1}`,
      value: value.length > 1024 ? value.substring(0, 1021) + "..." : value,
      inline: false
    };
  });

  const timingField = {
    name: "━━━━━━━━━━ Timing ━━━━━━━━━━",
    value: `**Total time:** ${formatTime(totalSeconds)}\n**Avg time per question:** ${formatTime(avgSeconds)}`,
    inline: false
  };

  const infoField = {
    name: "━━━━━━━━━━ Examinee Info ━━━━━━━━━━",
    value: infoValue,
    inline: false
  };

  const allFields = [infoField, ...mainFields, timingField];
  const chunks = [];
  for (let i = 0; i < allFields.length; i += 25) {
    chunks.push(allFields.slice(i, i + 25));
  }

const embeds = chunks.map((fields, i) => {
  const embed = {
    title: i === 0 ? "📋 TMP Phase 4 Examination" : "📋 TMP Phase 4 Examination (cont.)",
    color: 0xff69b4,
    fields
  };
  if (i === 0) embed.thumbnail = { url: "https://files.catbox.moe/ihvdd1.png" };
  if (i === chunks.length - 1) {
    embed.footer = { text: "TMP Phase 4 Examination System" };
    embed.timestamp = new Date().toISOString();
  }
  return embed;
});

  const embedBatches = [];
  for (let i = 0; i < embeds.length; i += 10) {
    embedBatches.push(embeds.slice(i, i + 10));
  }

  embedBatches.reduce((promise, batch) =>
    promise.then(() =>
      fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ embeds: batch })
      })
    ), Promise.resolve()
  )
  .then(() => console.log("Sent!"))
  .catch(e => console.error("Error:", e));
}

loadQuestion();
</script>
</body>
</html>
