<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timed Staff Application</title>
<style>
  body {
    font-family: "Segoe UI", sans-serif;
    background-color: #2f3136;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  #container {
    background-color: #36393f;
    padding: 30px;
    border-radius: 12px;
    width: 90%;
    max-width: 600px;
    text-align: left;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }
  #question {
    font-size: 18px;
    margin-bottom: 10px;
  }
  input[type="text"], textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
    font-size: 16px;
    resize: vertical;
  }
  button {
    padding: 10px 20px;
    border: none;
    background-color: #7289da;
    color: white;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
  }
  button:hover {
    background-color: #5b6eae;
  }
  #timer {
    font-weight: bold;
    margin-top: 5px;
    font-size: 16px;
    color: #ff5555;
  }
</style>
</head>
<body>

<div id="container">
  <h2>Staff Application</h2>
  <div id="question"></div>
  <textarea id="answer" rows="4" placeholder="Type your answer here"></textarea>
  <div id="timer"></div>
  <button onclick="nextQuestion()">Next</button>
</div>

<script>
const questions = [
  "You observe a Soldier wearing an Advisor mask and armband randomly killing a player in a restricted area they were not assigned to guard, while a Manager watches and fails to intervene.",
  "A VIP is using the :char command to appear as a Manager and is attempting to give orders to Workers during a tryout.",
  "A staff member submits a report clip of a player no-clipping, but the username is not visible in the footage.",
  "Describe the 'Authority Inheritance' protocol for a Sentry guarding a Supreme Rank. If a Sentry is guarding the Frontman, what authority do they possess over other staff members, and when is it valid?",
  "In Round 2 of a Soldier Evaluation (Outscore 9), an attendee finishes with 1250 Damage, a 1:1 KDR, and 450 heals. Do they pass?",
  "Write the exact sequence of commands to protect your tryoutees, identify flying exploiters, and the specific ban format for a user named 'RaidLeader123'.",
  "Identify the rank requirements for a Section Leader, a Platoon CO, and Company Leadership.",
  "During a Merit Department promotion wave, what are the specific restrictions regarding the discussion of Managers on Trial? Additionally, what is the mandatory evidence requirement for any individual being considered for a promotion to Supervisor or higher?",
  "Type a batch command string that gives you a sword, waits 5 seconds, announces 'Event Starting' to the server, and teleports all players on the 'Tryoutee' team to you.",
  "Contrast the primary roles of the Community Department and the Justice Department.",
  "Does High Command have authority over Sentry or Rangers? How do you report an infraction by a member of these divisions, and how do you identify 'stolen valor' using their mask ranks?",
  "Explain the specific regulations regarding VIP Vitality commands (e.g., :god) when a VIP intends to enter combat. What are the two conditions they must satisfy before engaging an armed opponent, and can they leave the VIP room while godded?",
  "Contrast the first-offense punishment for Corruption versus Insubordination for a Soldier. Who has the final authority on permanent blacklists?",
  "Explain the first three steps of the I STAFF method. What is the impact of being placed on Zero Tolerance?"
];

let current = 0;
let timeLeft = 120; // 2 minutes per question
let answers = [];
let timerInterval;

// Discord webhook URL
const webhookURL = "https://discord.com/api/webhooks/1487192982082949120/sVQ2wN2UB1oHlbqRtpjaOYUd6itFrHZe6dIbp1ireheQQYCnb4wQEPtHdmAf35UXKUPb";

function loadQuestion() {
  if (current >= questions.length) {
    sendToDiscord();
    document.getElementById("container").innerHTML = "<h2>Application Submitted!</h2><p>Thank you for applying.</p>";
    clearInterval(timerInterval);
    return;
  }

  document.getElementById("question").innerText = questions[current];
  document.getElementById("answer").value = "";
  timeLeft = 120;
  document.getElementById("timer").innerText = "Time left: " + timeLeft + "s";

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = "Time left: " + timeLeft + "s";
    if (timeLeft <= 0) {
      answers.push("Failed to answer within the provided time limit.");
      current++;
      loadQuestion();
    }
  }, 1000);
}

function nextQuestion() {
  const ans = document.getElementById("answer").value.trim() || "Failed to answer within the provided time limit.";
  answers.push(ans);
  current++;
  loadQuestion();
}

function sendToDiscord() {
  const content = answers.map((a, i) => `**Q${i+1}:** ${questions[i]}\n**A:** ${a}`).join("\n\n");
  fetch(webhookURL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ content: content })
  })
  .then(res => console.log("Sent to Discord!", res))
  .catch(err => console.error("Error sending to Discord:", err));
}

// Start the first question
loadQuestion();
</script>

</body>
</html>
