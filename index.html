<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMP Phase 4 Examination</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background-color: #0a0a0a;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(255, 105, 180, 0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0, 220, 255, 0.07) 0%, transparent 60%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
  }

  #app {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    background: linear-gradient(135deg, #0d0d0d, #111);
    border: 1px solid rgba(255, 105, 180, 0.3);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #ff69b4, #00dcff, #ff69b4);
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .header-logo {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    object-fit: cover;
    border: 1px solid rgba(255,105,180,0.4);
    flex-shrink: 0;
  }
  .header-text { flex: 1; }
  .header-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: #fff;
    letter-spacing: 1px;
  }
  .header-subtitle {
    font-size: 12px;
    color: #00dcff;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .notice-card {
    background: linear-gradient(135deg, rgba(0,220,255,0.05), rgba(255,105,180,0.05));
    border: 1px solid rgba(0, 220, 255, 0.25);
    border-radius: 12px;
    padding: 12px 16px;
    color: #99b4c0;
    font-size: 12px;
    text-align: center;
    line-height: 1.6;
    transition: opacity 0.5s, max-height 0.5s, padding 0.5s, margin 0.5s;
    overflow: hidden;
    max-height: 100px;
  }
  .notice-card.hidden {
    opacity: 0;
    max-height: 0;
    padding: 0;
    margin: 0;
    border: none;
  }
  .notice-card strong { color: #00dcff; }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .progress {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: #ff69b4;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .timer {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #00dcff;
    letter-spacing: 1px;
  }
  .timer.warning { color: #ff4444; animation: pulse 0.8s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

  .progress-bar-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff69b4, #00dcff);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .question-card {
    background: #0d0d0d;
    border: 1px solid rgba(255, 105, 180, 0.3);
    border-radius: 16px;
    padding: 28px 24px;
    color: #f0f0f0;
    min-height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    text-align: center;
    line-height: 1.7;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(255, 105, 180, 0.05);
  }
  .question-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,220,255,0.4), transparent);
  }

  #input-area { display: flex; gap: 10px; }
  #answer {
    flex: 1;
    padding: 13px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255, 105, 180, 0.35);
    background: #0d0d0d;
    color: #fff;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #answer::placeholder { color: #444; }
  #answer:focus {
    border-color: #00dcff;
    box-shadow: 0 0 0 3px rgba(0, 220, 255, 0.08);
  }
  #sendBtn {
    padding: 13px 22px;
    border-radius: 12px;
    border: 1px solid rgba(255, 105, 180, 0.5);
    background: linear-gradient(135deg, rgba(255,105,180,0.12), rgba(0,220,255,0.08));
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: all 0.2s;
    white-space: nowrap;
  }
  #sendBtn:hover {
    background: linear-gradient(135deg, #ff69b4, #00dcff);
    border-color: transparent;
    color: #000;
    box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
  }

  .done-card {
    background: #0d0d0d;
    border: 1px solid rgba(0, 220, 255, 0.3);
    border-radius: 16px;
    padding: 40px 28px;
    color: #fff;
    text-align: center;
    line-height: 2;
    box-shadow: 0 0 40px rgba(0, 220, 255, 0.05);
  }
  .done-card .check { font-size: 36px; display: block; margin-bottom: 12px; }
  .done-card .done-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 22px;
    background: linear-gradient(90deg, #ff69b4, #00dcff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  .done-card .done-sub { color: #555; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <img src="https://i.imgur.com/mWDOZI5.png" class="header-logo" alt="TMP Logo">
    <div class="header-text">
      <div class="header-title">TMP EXAMINATION</div>
      <div class="header-subtitle">Phase 4 · Written Assessment</div>
    </div>
  </div>

  <div class="notice-card" id="notice">
    <strong>⚠️ Notice</strong><br>
    Your answers will be submitted to TMP staff via Discord for review. By completing this examination, you consent to your responses being stored and reviewed by TMP staff.
  </div>

  <div class="meta-row">
    <div class="progress" id="progress"></div>
    <div class="timer" id="timer"></div>
  </div>

  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
  </div>

  <div id="question" class="question-card">Loading...</div>

  <div id="input-area">
    <input type="text" id="answer" placeholder="Type your answer here...">
    <button id="sendBtn">Submit</button>
  </div>

</div>

<script>
const WORKER_URL = "https://server.yyourmom96.workers.dev";
const TIME_LIMIT = 120;
const LOGO_URL = "https://i.imgur.com/mWDOZI5.png";

const infoQuestions = [
  "Enter your Roblox username:",
  "Enter your Discord username:",
  "Enter your Discord ID:"
];

const mainQuestions = [
  "You observe a Soldier wearing an Advisor mask and armband, randomly killing a player in a restricted area they were not assigned to guard, while a Manager watches and fails to intervene. What do you do?",
  "A VIP is using the :char command to appear as a Manager and is attempting to give orders to Workers during a tryout. What do you do?",
  "A staff member submits a report clip of a player no-clipping, but the username is not visible in the footage. What do you do?",
  "Describe the 'Authority Inheritance' protocol for a Sentry guarding a Supreme Rank. If a Sentry is guarding the Frontman, what specific authority do they possess over other staff members, and when is this authority valid?",
  "In Round 2 of a Soldier Evaluation (Outscore 9), an attendee finishes with 1250 Damage, a 1:1 KDR, and 450 heals. Do they pass? What do you do?",
  "Write the exact sequence of commands to protect your tryoutees, identify flying exploiters, and the specific ban format for a user named 'RaidLeader123'.",
  "Identify the rank requirements for a Section Leader, a Platoon CO, and Company Leadership.",
  "During a Merit Department promotion wave, what are the specific restrictions regarding the discussion of Managers on Trial? Additionally, what is the mandatory evidence requirement for any individual being considered for a promotion to Supervisor or higher?",
  "Type a batch command string that gives you a sword, waits 5 seconds, announces 'Event Starting' to the server, and teleports all players on the 'Tryoutee' team to you.",
  "Contrast the primary roles of the Community Department and the Justice Department.",
  "Does High Command have authority over Sentry or Rangers? How do you report an infraction by a member of these divisions, and how do you identify 'stolen valor' using their mask ranks?",
  "Explain the specific regulations regarding VIP Vitality commands (e.g., :god) when a VIP intends to enter combat. What are the two conditions they must satisfy before engaging an armed opponent, and can they leave the VIP room while godded?",
  "Contrast the first-offense punishment for Corruption versus Insubordination for a Soldier. Who has the final authority on permanent blacklists?",
  "Explain the first three steps of the I STAFF method. What is the impact of being placed on Zero Tolerance?"
];

const allQuestions = [...infoQuestions, ...mainQuestions];
let current = 0;
const answers = [];
let timerInterval = null;
let secondsLeft = TIME_LIMIT;
let appStartTime = Date.now();
let questionStartTime = Date.now();
let questionTimes = [];

const questionEl = document.getElementById('question');
const answerEl = document.getElementById('answer');
const sendBtn = document.getElementById('sendBtn');
const progressEl = document.getElementById('progress');
const timerEl = document.getElementById('timer');
const progressBar = document.getElementById('progressBar');
const noticeEl = document.getElementById('notice');

sendBtn.addEventListener('click', () => nextQuestion(false));
answerEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); nextQuestion(false); }
});

function startTimer() {
  clearInterval(timerInterval);
  secondsLeft = TIME_LIMIT;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimerDisplay();
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      nextQuestion(true);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const mins = Math.floor(secondsLeft / 60);
  const secs = secondsLeft % 60;
  timerEl.textContent = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
  timerEl.className = 'timer' + (secondsLeft <= 30 ? ' warning' : '');
}

function loadQuestion() {
  if (current >= allQuestions.length) {
    clearInterval(timerInterval);
    timerEl.style.display = 'none';
    progressEl.style.display = 'none';
    progressBar.parentElement.style.display = 'none';
    document.getElementById('input-area').style.display = 'none';
    noticeEl.classList.add('hidden');
    questionEl.className = 'done-card';
    questionEl.innerHTML = `
      <span class="check">✅</span>
      <div class="done-title">Examination Submitted</div>
      <div class="done-sub">Your answers have been sent to TMP staff for review.</div>
    `;
    sendToDiscord();
    return;
  }

  if (current === 1) noticeEl.classList.add('hidden');

  const pct = (current / allQuestions.length) * 100;
  progressBar.style.width = pct + '%';

  timerEl.style.display = current >= infoQuestions.length ? 'block' : 'none';
  progressEl.textContent = `Question ${current + 1} / ${allQuestions.length}`;
  questionEl.textContent = allQuestions[current];
  answerEl.value = '';
  answerEl.focus();
  questionStartTime = Date.now();

  if (current >= infoQuestions.length) {
    startTimer();
  } else {
    clearInterval(timerInterval);
  }
}

function nextQuestion(timedOut) {
  const timeSpent = Math.round((Date.now() - questionStartTime) / 1000);
  if (current >= infoQuestions.length) {
    questionTimes.push(timedOut ? TIME_LIMIT : Math.min(timeSpent, TIME_LIMIT));
  }
  const ans = timedOut || answerEl.value.trim() === ''
    ? "Failure to provide an answer within the time limit."
    : answerEl.value.trim();
  answers.push(ans);
  current++;
  loadQuestion();
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function sendToDiscord() {
  const robloxUser = answers[0] || "Unknown User";
  
  let content = `👤 **Examinee Info**\n`;
  infoQuestions.forEach((q, i) => {
    content += `**${q}** ${answers[i]}\n\n`;
  });

  content += `📝 **Responses**\n`;
  mainQuestions.forEach((q, i) => {
    const answer = answers[infoQuestions.length + i] || "TIMEOUT/NO ANSWER";
    content += `**Q${i+1}:** ${q}\n**A:** ${answer}\n\n`;
  });

  const payload = {
    username: robloxUser,
    content: content
  };

  fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(res => {
    if (res.ok) console.log("Sent");
  })
  .catch(err => console.error(err));
}

loadQuestion();
</script>
</body>
</html>
