<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMP Phase 4 Examination</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background-color: #0a0a0a;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(255, 105, 180, 0.07) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(0, 220, 255, 0.07) 0%, transparent 60%);
    display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 24px;
  }
  #app { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 12px; }
  .header { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: linear-gradient(135deg, #0d0d0d, #111); border: 1px solid rgba(255, 105, 180, 0.3); border-radius: 16px; position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #ff69b4, #00dcff, #ff69b4); background-size: 200% 100%; animation: shimmer 3s linear infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .header-logo { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; border: 1px solid rgba(255,105,180,0.4); flex-shrink: 0; }
  .header-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 18px; color: #fff; letter-spacing: 1px; }
  .header-subtitle { font-size: 12px; color: #00dcff; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
  .notice-card { background: linear-gradient(135deg, rgba(0,220,255,0.05), rgba(255,105,180,0.05)); border: 1px solid rgba(0, 220, 255, 0.25); border-radius: 12px; padding: 12px 16px; color: #99b4c0; font-size: 12px; text-align: center; line-height: 1.6; }
  .glow-text { color: #00dcff; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; animation: text-pulse 2s infinite ease-in-out; }
  @keyframes text-pulse { 0%, 100% { text-shadow: 0 0 5px rgba(0, 220, 255, 0.3); opacity: 0.8; } 50% { text-shadow: 0 0 15px rgba(0, 220, 255, 0.9), 0 0 25px rgba(0, 220, 255, 0.5); opacity: 1; color: #fff; } }
  .meta-row { display: flex; justify-content: space-between; align-items: center; }
  .progress { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 13px; color: #ff69b4; text-transform: uppercase; }
  .timer { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px; color: #00dcff; display: none; }
  .progress-bar-track { width: 100%; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #ff69b4, #00dcff); transition: width 0.4s ease; }
  .question-card { background: #0d0d0d; border: 1px solid rgba(255, 105, 180, 0.3); border-radius: 16px; padding: 40px 24px; color: #f0f0f0; min-height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
  .fade-in { animation: questionFade 0.5s ease forwards; }
  @keyframes questionFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  #input-area { display: none; gap: 10px; margin-top: 10px; }
  #answer { flex: 1; padding: 13px 16px; border-radius: 12px; border: 1px solid rgba(255, 105, 180, 0.35); background: #0d0d0d; color: #fff; outline: none; }
  #answer:focus { outline: 2px solid #00dcff !important; border-color: #00dcff; }
  .action-btn { padding: 14px 28px; border-radius: 12px; border: 1px solid rgba(0, 220, 255, 0.5); background: rgba(0, 220, 255, 0.1); color: #00dcff; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
  .action-btn:hover { background: #00dcff; color: #000; box-shadow: 0 0 20px rgba(0, 220, 255, 0.4); }
  #sendBtn { padding: 13px 22px; border-radius: 12px; border: 1px solid #ff69b4; background: transparent; color: #fff; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
  #sendBtn:hover { background: linear-gradient(90deg, #ff69b4, #00dcff) !important; color: #000 !important; border-color: transparent !important; }
  .start-btn { border-color: rgba(255, 105, 180, 0.5); background: rgba(255, 105, 180, 0.1); color: #ff69b4; }
  .start-btn:hover { background: #ff69b4; color: #000; }
  .credit-text { font-family: 'Rajdhani', sans-serif; font-size: 10px; color: rgba(255, 255, 255, 0.2); text-align: center; letter-spacing: 4px; margin-top: 15px; transition: opacity 1s ease, transform 1s ease; }
  .credit-hidden { opacity: 0; transform: translateY(5px); pointer-events: none; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <img src="https://i.imgur.com/mWDOZI5.png" class="header-logo" alt="Logo">
    <div class="header-text">
      <div class="header-title">TMP EXAMINATION</div>
      <div class="header-subtitle">Phase 4 · Written Assessment</div>
    </div>
  </div>
  <div class="notice-card" id="notice">
    <span class="glow-text">Verification Required</span><br>
    Click below to link your Discord account. This is required to start.
  </div>
  <div class="meta-row">
    <div class="progress" id="progress">Awaiting Link...</div>
    <div class="timer" id="timer">⏱ 2:00</div>
  </div>
  <div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div>
  <div id="question" class="question-card">
    <button id="discordBtn" class="action-btn" onclick="loginWithDiscord()">Link Discord Account</button>
    <button id="startBtn" class="action-btn start-btn" onclick="startExam()" style="display:none;">Start Examination</button>
  </div>
  <div id="input-area">
    <input type="text" id="answer" placeholder="Type your answer here...">
    <button id="sendBtn">Submit</button>
  </div>
  <div id="credit" class="credit-text">CREATED BY FAEVYNL</div>
</div>
<script>
const SFX_CLICK = new Audio('https://jumpshare.com/v/LFo1WquHK7D5LjT5KEen?download=1');
const SFX_TICK = new Audio('https://jumpshare.com/v/EcwbcLaD3lil4b735Vbo?download=1');
const SFX_SUCCESS = new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_06d36f8f53.mp3');

SFX_TICK.loop = true;

const WORKER_URL = "https://server.yyourmom96.workers.dev";
const CLIENT_ID = '1487244125488152589';
const REDIRECT_URI = window.location.href.split('#')[0];
const TIME_LIMIT = 120;
let current = 0; let answers = []; let timerInterval = null; let secondsLeft = TIME_LIMIT; window.linkedUser = null;
const infoQuestions = ["Enter your Roblox username:"];
let mainQuestions = []; let allQuestions = [...infoQuestions];

function playClick() { SFX_CLICK.currentTime = 0; SFX_CLICK.play().catch(() => {}); }
function stopTick() { SFX_TICK.pause(); SFX_TICK.currentTime = 0; }

function loginWithDiscord() {
    SFX_CLICK.play().then(() => { SFX_CLICK.pause(); SFX_CLICK.currentTime = 0; });
    window.location.href = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
}
window.onload = () => {
    const params = new URLSearchParams(window.location.hash.slice(1));
    const token = params.get('access_token') || localStorage.getItem('discord_token');
    if (token) validateDiscordUser(token);
};
function validateDiscordUser(token) {
    fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } })
    .then(res => res.json())
    .then(user => {
        localStorage.setItem('discord_token', token);
        window.linkedUser = user;
        document.getElementById('notice').innerHTML = `<span class="glow-text">Verified</span><br>${user.username}`;
        document.getElementById('discordBtn').style.display = 'none';
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('progress').innerText = "Account Verified";
    });
}
async function startExam() {
    SFX_CLICK.load(); SFX_TICK.load(); SFX_SUCCESS.load();
    try {
        const response = await fetch(WORKER_URL);
        const data = await response.json();
        mainQuestions = data.questions;
        allQuestions = [...infoQuestions, ...mainQuestions];
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('notice').style.display = 'none';
        document.getElementById('input-area').style.display = 'flex';
        loadQuestion();
    } catch (e) { alert("Server Error."); }
}
function loadQuestion() {
    const qContainer = document.getElementById('question');
    const credit = document.getElementById('credit');
    if (current > 0) credit.classList.add('credit-hidden');
    if (current >= allQuestions.length) { finishExam(); return; }
    playClick();
    qContainer.classList.remove('fade-in');
    void qContainer.offsetWidth; 
    qContainer.classList.add('fade-in');
    document.getElementById('progressBar').style.width = (current / allQuestions.length) * 100 + '%';
    document.getElementById('progress').innerText = `Question ${current + 1} / ${allQuestions.length}`;
    qContainer.innerText = allQuestions[current];
    document.getElementById('answer').value = '';
    document.getElementById('answer').focus();
    if (current >= infoQuestions.length) {
        document.getElementById('timer').style.display = 'block';
        startTimer();
    } else {
        stopTick();
    }
}
function startTimer() {
    clearInterval(timerInterval);
    secondsLeft = TIME_LIMIT;
    SFX_TICK.play().catch(() => {});
    timerInterval = setInterval(() => {
        secondsLeft--;
        const mins = Math.floor(secondsLeft / 60); const secs = secondsLeft % 60;
        document.getElementById('timer').innerText = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
        if (secondsLeft <= 0) nextQuestion(true);
    }, 1000);
}
function nextQuestion(timedOut = false) {
    stopTick();
    answers.push(timedOut ? "Timed Out" : (document.getElementById('answer').value.trim() || "Examinee failed to provide an answer."));
    current++; loadQuestion();
}
document.getElementById('sendBtn').onclick = () => nextQuestion(false);
document.getElementById('answer').onkeydown = (e) => { if(e.key === 'Enter') nextQuestion(false); };
function finishExam() {
    stopTick();
    clearInterval(timerInterval);
    document.getElementById('timer').style.display = 'none';
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('question').innerHTML = `<div class="glow-text">Submitting Data...</div>`;
    const user = window.linkedUser;
    let content = `**Roblox**: ${answers[0]}\n**Discord**: ${user.username}\n\n`;
    mainQuestions.forEach((q, i) => { content += `**Q${i+1}:** ${q}\n> ${answers[i+1]}\n\n`; });
    fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: answers[0], content, avatar: `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`, tag: user.username })
    }).then(() => {
        SFX_SUCCESS.play().catch(() => {});
        document.getElementById('question').innerHTML = `<div class="glow-text" style="font-size:24px;">✅ Submitted Successfully</div>`;
    });
}
</script>
</body>
</html>
